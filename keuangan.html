<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Keuanganku">
<meta name="theme-color" content="#0f172a">
<title>Keuanganku</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#2d3f55;--card:#1a2744;
  --border:rgba(255,255,255,0.07);--text:#f1f5f9;--muted:#7c93b0;
  --saldo:#38bdf8;--saldo-dim:rgba(56,189,248,0.12);
  --cash:#34d399;--cash-dim:rgba(52,211,153,0.12);
  --danger:#f87171;--danger-dim:rgba(248,113,113,0.12);
  --green:#4ade80;--green-dim:rgba(74,222,128,0.12);
  --r:14px;--rsm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;overscroll-behavior:none}

/* ── App shell ── */
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative}

/* ── Top bar ── */
.topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:52px 20px 16px;
  background:linear-gradient(180deg,#0a1628 0%,var(--bg) 100%);
  flex-shrink:0;
}
.app-title{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.app-title span{color:var(--saldo)}
.tab-switch{display:flex;background:rgba(255,255,255,0.06);border-radius:50px;padding:3px;gap:2px;border:1px solid var(--border)}
.tab-btn{padding:7px 18px;border-radius:50px;border:none;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--muted);background:transparent;letter-spacing:0.2px}
.tab-btn.act-s{background:var(--saldo);color:#0a1628;box-shadow:0 2px 12px rgba(56,189,248,0.35)}
.tab-btn.act-c{background:var(--cash);color:#0a1628;box-shadow:0 2px 12px rgba(52,211,153,0.35)}

/* ── Scrollable content ── */
.content{flex:1;overflow-y:auto;padding:0 16px 100px;scrollbar-width:none}
.content::-webkit-scrollbar{display:none}

/* ── Summary card ── */
.summary{
  background:linear-gradient(135deg,#1a2f52 0%,#162440 100%);
  border-radius:20px;padding:18px 20px;border:1px solid rgba(56,189,248,0.15);
  margin-bottom:14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}
.summary.cash-mode{
  background:linear-gradient(135deg,#0f3028 0%,#0d2620 100%);
  border-color:rgba(52,211,153,0.15);
}
.sum-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.bal-label{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:5px;letter-spacing:0.5px;text-transform:uppercase}
.bal-value{font-size:30px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.bal-s{color:var(--saldo)}.bal-c{color:var(--cash)}.bal-neg{color:var(--danger)}
.sum-right{text-align:right}
.sum-badge{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(255,255,255,0.07);border-radius:8px;
  padding:6px 10px;border:1px solid var(--border);
}
.sum-badge-label{font-size:10px;color:var(--muted);display:block;margin-bottom:2px}
.sum-badge-val{font-size:13px;font-weight:700}
.sum-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat{background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 12px;border:1px solid var(--border)}
.stat-label{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:600;letter-spacing:0.3px}
.stat-val{font-size:15px;font-weight:700}

/* ── Kas section ── */
.kas-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 16px;margin-bottom:12px;
}
.kas-card-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.kas-inputs{display:flex;gap:8px;align-items:stretch}
.kas-inputs input{
  flex:1;background:var(--bg3);border:1.5px solid var(--border);
  color:var(--text);font-family:inherit;font-size:14px;
  padding:10px 12px;border-radius:var(--rsm);-webkit-appearance:none;
  transition:border-color .2s;min-width:0;
}
.kas-inputs input:focus{outline:none}
.kas-inputs input.fi-s:focus{border-color:var(--saldo)}
.kas-inputs input.fi-c:focus{border-color:var(--cash)}
.kas-add-btn{
  padding:10px 16px;border-radius:var(--rsm);border:none;
  font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;
  white-space:nowrap;flex-shrink:0;letter-spacing:0.2px;
  transition:all .15s;
}
.kas-add-btn.s{background:var(--saldo);color:#0a1628;box-shadow:0 2px 10px rgba(56,189,248,0.3)}
.kas-add-btn.c{background:var(--cash);color:#0a1628;box-shadow:0 2px 10px rgba(52,211,153,0.3)}
.kas-add-btn:active{transform:scale(0.95);opacity:0.9}
.kas-hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5;padding:0 2px}

/* ── Filter chips ── */
.filter-wrap{margin-bottom:10px}
.filter-label-txt{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
.filter-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.filter-scroll::-webkit-scrollbar{display:none}
.chip{
  padding:6px 14px;border-radius:50px;border:1.5px solid var(--border);
  background:var(--bg2);font-size:12px;font-weight:600;color:var(--muted);
  cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.chip.act-s{background:var(--saldo-dim);border-color:var(--saldo);color:var(--saldo)}
.chip.act-c{background:var(--cash-dim);border-color:var(--cash);color:var(--cash)}

/* ── Section label ── */
.sec-label{
  font-size:10px;font-weight:700;color:var(--muted);
  letter-spacing:0.6px;text-transform:uppercase;
  padding:10px 2px 6px;
}

/* ── Entry rows ── */
.entry{
  display:flex;align-items:center;gap:10px;
  padding:11px 13px;background:var(--bg2);
  border-radius:var(--rsm);margin-bottom:5px;
  border:1px solid var(--border);
  transition:background .15s;
}
.entry:active{background:var(--bg3)}
.entry-icon{
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.icon-in{background:var(--green-dim)}
.icon-out{background:rgba(255,255,255,0.04)}
.entry-info{flex:1;min-width:0}
.entry-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.entry-sub{font-size:11px;font-weight:500;color:var(--muted)}
.entry-right{text-align:right;flex-shrink:0}
.entry-amount{font-size:14px;font-weight:700}
.amt-in{color:var(--green)}.amt-out{color:var(--danger)}
.del-btn{
  width:30px;height:30px;border-radius:8px;border:none;
  background:var(--danger-dim);color:var(--danger);
  cursor:pointer;font-size:15px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.del-btn:active{transform:scale(0.9);background:var(--danger);color:#fff}

/* kas awal footer */
.kas-awal-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;background:rgba(255,255,255,0.03);
  border-radius:8px;margin:4px 0 8px;border:1px solid var(--border);
  font-size:12px;
}

/* ── All-view rows ── */
.all-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;background:var(--bg2);
  border-radius:var(--rsm);margin-bottom:5px;
  border:1px solid var(--border);cursor:pointer;transition:all .15s;
}
.all-row:active{background:var(--bg3)}
.all-row-date{font-size:13px;font-weight:700;margin-bottom:3px}
.all-row-sub{font-size:11px;color:var(--muted)}
.all-row-right{text-align:right}
.all-row-sisa{font-size:15px;font-weight:800;letter-spacing:-0.5px}
.all-row-hint{font-size:10px;color:var(--muted);margin-top:2px}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px}
.empty-icon{font-size:44px;margin-bottom:12px}
.empty-text{font-size:14px;color:var(--muted);line-height:1.7}

/* ── FAB — center bottom ── */
.fab-wrap{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  padding:12px 20px 28px;
  background:linear-gradient(0deg,var(--bg) 60%,transparent);
  display:flex;justify-content:center;
  pointer-events:none;z-index:100;
}
.fab{
  width:56px;height:56px;border-radius:50%;border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:28px;color:#0a1628;font-weight:700;
  transition:all .2s;pointer-events:all;
  box-shadow:0 4px 24px rgba(0,0,0,0.5);
}
.fab.s{background:var(--saldo);box-shadow:0 4px 24px rgba(56,189,248,0.45)}
.fab.c{background:var(--cash);box-shadow:0 4px 24px rgba(52,211,153,0.45)}
.fab:active{transform:scale(0.9)}

/* ── Bottom sheet ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(6px)}
.overlay.open{opacity:1;pointer-events:all}
.sheet{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:430px;
  background:var(--bg2);border-radius:24px 24px 0 0;
  padding:12px 20px 40px;z-index:300;
  transition:transform .32s cubic-bezier(.4,0,.2,1);
  border-top:1px solid rgba(255,255,255,0.08);
}
.sheet.open{transform:translateX(-50%) translateY(0)}
.sheet-handle{width:40px;height:4px;background:rgba(255,255,255,0.12);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:17px;font-weight:800;margin-bottom:16px;text-align:center;letter-spacing:-0.3px}
.field{margin-bottom:13px}
.field label{font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase}
.field input{
  width:100%;background:var(--bg3);border:1.5px solid var(--border);
  color:var(--text);font-family:inherit;font-size:15px;
  padding:13px 15px;border-radius:var(--rsm);-webkit-appearance:none;transition:border-color .2s;
}
.field input:focus{outline:none}
.field input.fi-s:focus{border-color:var(--saldo)}
.field input.fi-c:focus{border-color:var(--cash)}
.save-btn{
  width:100%;padding:15px;border-radius:var(--rsm);border:none;
  font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;
  margin-top:6px;letter-spacing:0.3px;transition:all .15s;
}
.save-btn.s{background:var(--saldo);color:#0a1628;box-shadow:0 4px 16px rgba(56,189,248,0.35)}
.save-btn.c{background:var(--cash);color:#0a1628;box-shadow:0 4px 16px rgba(52,211,153,0.35)}
.save-btn:active{transform:scale(0.98);opacity:0.9}

/* ── Install banner ── */
.banner{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--rsm);padding:10px 14px;
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
}
.banner-text{flex:1;font-size:12px;color:var(--muted);line-height:1.5}
.banner-text strong{color:var(--text)}
.banner-x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:2px}
</style>
</head>
<body>
<div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="app-title">💰 Keuangan<span>ku</span></div>
    <div class="tab-switch">
      <button class="tab-btn act-s" id="tab-s" onclick="switchTab('saldo')">Saldo</button>
      <button class="tab-btn" id="tab-c" onclick="switchTab('cash')">Cash</button>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="content" id="content">

    <!-- Summary -->
    <div class="summary" id="summary">
      <div class="sum-top">
        <div>
          <div class="bal-label" id="sum-label">Sisa Saldo</div>
          <div class="bal-value bal-s" id="sum-sisa">Rp 0</div>
        </div>
        <div class="sum-right">
          <div class="sum-badge">
            <div>
              <span class="sum-badge-label" id="sum-awal-label">Kas Masuk</span>
              <div class="sum-badge-val" id="sum-awal-val" style="color:var(--saldo)">Rp 0</div>
            </div>
          </div>
        </div>
      </div>
      <div class="sum-row">
        <div class="stat">
          <div class="stat-label">💸 Total Keluar</div>
          <div class="stat-val" id="sum-keluar" style="color:var(--danger)">Rp 0</div>
        </div>
        <div class="stat">
          <div class="stat-label">🧾 Transaksi</div>
          <div class="stat-val" id="sum-trx" style="color:var(--muted)">0 item</div>
        </div>
      </div>
    </div>

    <!-- Tambah kas -->
    <div class="kas-card">
      <div class="kas-card-title"><span id="kas-icon">💳</span> <span id="kas-title">Tambah Pemasukan</span></div>
      <div class="kas-inputs">
        <input type="date" id="kas-tgl" class="fi-s">
        <input type="number" id="kas-jml" placeholder="Jumlah (Rp)" inputmode="numeric" class="fi-s">
        <button class="kas-add-btn s" id="kas-btn" onclick="addKas()">＋ Kas</button>
      </div>
      <div class="kas-hint" id="kas-hint">Sisa hari sebelumnya otomatis terbawa. Riwayat pemasukan bisa dihapus jika salah input.</div>
    </div>

    <!-- Install banner -->
    <div id="install-banner" class="banner" style="display:none">
      <div style="font-size:20px">📲</div>
      <div class="banner-text"><strong>Simpan ke homescreen!</strong><br>Chrome → ⋮ → Add to Home Screen</div>
      <button class="banner-x" onclick="document.getElementById('install-banner').style.display='none'">✕</button>
    </div>

    <!-- Filter -->
    <div class="filter-wrap">
      <div class="filter-label-txt">Filter Tanggal</div>
      <div class="filter-scroll" id="filter-chips"></div>
    </div>

    <!-- List -->
    <div id="list-area"></div>

  </div><!-- end content -->
</div>

<!-- FAB -->
<div class="fab-wrap">
  <button class="fab s" id="fab" onclick="openSheet()">＋</button>
</div>

<!-- Overlay & Sheet -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheet-title">Tambah Pengeluaran</div>
  <div class="field"><label>Tanggal</label><input type="date" id="inp-tgl" class="fi-s"></div>
  <div class="field"><label>Item / Keterangan</label><input type="text" id="inp-item" placeholder="Contoh: Bayar listrik" class="fi-s"></div>
  <div class="field"><label>Harga (Rp)</label><input type="number" id="inp-harga" placeholder="0" inputmode="numeric" class="fi-s"></div>
  <button class="save-btn s" id="save-btn" onclick="addEntry()">Simpan</button>
</div>

<script>
const ICONS=['🛒','🍜','🚗','💊','🏠','👕','📱','⚡','🎮','🎁','✈️','🐾','🧾','☕','🧴','🎓','🏥','🍕','🎵','🔧'];
let tab='saldo', filter='all';
let data={saldo:[],cash:[]};
let income={saldo:[],cash:[]};

function load(){
  try{
    ['saldo','cash'].forEach(t=>{
      const d=localStorage.getItem('keu6_out_'+t);
      const i=localStorage.getItem('keu6_in_'+t);
      if(d) data[t]=JSON.parse(d);
      if(i) income[t]=JSON.parse(i);
    });
  }catch(e){}
}
function saveOut(t){try{localStorage.setItem('keu6_out_'+t,JSON.stringify(data[t]));}catch(e){}}
function saveIn(t){try{localStorage.setItem('keu6_in_'+t,JSON.stringify(income[t]));}catch(e){}}

function fmt(n){return 'Rp '+Math.round(n).toLocaleString('id-ID')}
function fmtDate(s){
  if(!s)return'';
  return new Date(s+'T00:00:00').toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function fmtShort(s){
  if(!s)return'';
  return new Date(s+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short'});
}
function todayStr(){return new Date().toISOString().split('T')[0];}

function getAllDates(){
  const s=new Set([...income[tab].map(e=>e.tgl),...data[tab].map(e=>e.tgl)]);
  return [...s].sort();
}

function computeSisa(){
  const dates=[...new Set([...income[tab].map(e=>e.tgl),...data[tab].map(e=>e.tgl)])].sort();
  const result={};
  let prevSisa=0;
  dates.forEach(d=>{
    const masuk=income[tab].filter(e=>e.tgl===d).reduce((s,e)=>s+e.jumlah,0);
    const kasAwal=prevSisa+masuk;
    const keluar=data[tab].filter(e=>e.tgl===d).reduce((s,e)=>s+e.harga,0);
    const sisa=kasAwal-keluar;
    result[d]={kasAwal,masuk,keluar,sisa,sisaKemarin:prevSisa};
    prevSisa=sisa;
  });
  return result;
}

function addKas(){
  const tgl=document.getElementById('kas-tgl').value;
  const jml=parseFloat(document.getElementById('kas-jml').value)||0;
  if(!tgl||!jml)return;
  income[tab].push({id:Date.now(),tgl,jumlah:jml});
  saveIn(tab);
  document.getElementById('kas-jml').value='';
  filter=tgl;
  render();
}

function delIncome(id){
  if(!confirm('Hapus pemasukan ini?\nSaldo akan berkurang sesuai jumlah yang dihapus.'))return;
  income[tab]=income[tab].filter(e=>e.id!==id);
  saveIn(tab);render();
}
function delOut(id){
  if(!confirm('Hapus pengeluaran ini?'))return;
  data[tab]=data[tab].filter(e=>e.id!==id);
  saveOut(tab);render();
}

function switchTab(t){
  tab=t;filter='all';
  const iS=t==='saldo';
  document.getElementById('tab-s').className='tab-btn'+(iS?' act-s':'');
  document.getElementById('tab-c').className='tab-btn'+(!iS?' act-c':'');
  document.getElementById('fab').className='fab '+(iS?'s':'c');
  document.getElementById('save-btn').className='save-btn '+(iS?'s':'c');
  document.getElementById('kas-btn').className='kas-add-btn '+(iS?'s':'c');
  document.getElementById('summary').className='summary'+(iS?'':' cash-mode');
  document.getElementById('sheet-title').textContent='Tambah Pengeluaran '+(iS?'Saldo':'Cash');
  ['inp-tgl','inp-item','inp-harga','kas-tgl','kas-jml'].forEach(id=>{
    document.getElementById(id).className=iS?'fi-s':'fi-c';
  });
  document.getElementById('kas-icon').textContent=iS?'💳':'💵';
  document.getElementById('kas-title').textContent=iS?'Tambah Saldo / Pemasukan':'Tambah Cash Harian';
  render();
}

function setFilter(f){filter=f;render();}

function render(){
  const computed=computeSisa();
  const dates=Object.keys(computed).sort();
  const iS=tab==='saldo';
  const acColor=iS?'var(--saldo)':'var(--cash)';
  const ac=iS?'act-s':'act-c';

  // Summary
  const lastDate=dates[dates.length-1];
  if(filter==='all'){
    const sisaAkhir=lastDate?computed[lastDate].sisa:0;
    const totMasuk=income[tab].reduce((s,e)=>s+e.jumlah,0);
    const totKeluar=data[tab].reduce((s,e)=>s+e.harga,0);
    setSummary('Sisa '+(iS?'Saldo':'Cash'),sisaAkhir,'Total Kas Masuk',totMasuk,totKeluar,data[tab].length,acColor);
  } else {
    const c=computed[filter]||{kasAwal:0,masuk:0,keluar:0,sisa:0};
    setSummary(fmtDate(filter),c.sisa,'Kas Masuk Hari Ini',c.masuk,c.keluar,data[tab].filter(e=>e.tgl===filter).length,acColor);
  }

  // Chips
  const fc=document.getElementById('filter-chips');
  fc.innerHTML=`<div class="chip ${filter==='all'?ac:''}" onclick="setFilter('all')">Semua</div>`;
  dates.forEach(d=>{
    fc.innerHTML+=`<div class="chip ${filter===d?ac:''}" onclick="setFilter('${d}')">${fmtShort(d)}</div>`;
  });

  // List
  const la=document.getElementById('list-area');

  if(filter==='all'){
    if(dates.length===0){
      la.innerHTML=`<div class="empty"><div class="empty-icon">${iS?'💳':'💵'}</div><div class="empty-text">Belum ada data.<br>Tambahkan pemasukan dulu,<br>lalu catat pengeluaran.</div></div>`;
      return;
    }
    let html='';
    dates.forEach(d=>{
      const c=computed[d];
      const sc=c.sisa>=0?acColor:'var(--danger)';
      const parts=[];
      if(c.masuk>0) parts.push(`+${fmt(c.masuk)}`);
      if(c.keluar>0) parts.push(`−${fmt(c.keluar)}`);
      html+=`<div class="all-row" onclick="setFilter('${d}')">
        <div>
          <div class="all-row-date">📅 ${fmtDate(d)}</div>
          <div class="all-row-sub">${parts.join(' · ')||'Tidak ada transaksi'}</div>
        </div>
        <div class="all-row-right">
          <div class="all-row-sisa" style="color:${sc}">${fmt(c.sisa)}</div>
          <div class="all-row-hint">sisa akhir →</div>
        </div>
      </div>`;
    });
    la.innerHTML=html;
    return;
  }

  // Detail hari
  const c=computed[filter]||{kasAwal:0,masuk:0,keluar:0,sisa:0,sisaKemarin:0};
  const dayIncome=income[tab].filter(e=>e.tgl===filter).sort((a,b)=>a.id-b.id);
  const dayOut=data[tab].filter(e=>e.tgl===filter).sort((a,b)=>a.id-b.id);

  if(dayIncome.length===0&&dayOut.length===0&&!c.kasAwal){
    la.innerHTML=`<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">Tidak ada transaksi.<br>Tap ＋ untuk tambah pengeluaran.</div></div>`;
    return;
  }

  let html=`<div class="sec-label">💰 Pemasukan & Saldo Awal</div>`;

  if(c.sisaKemarin>0){
    html+=`<div class="entry">
      <div class="entry-icon icon-in">↩️</div>
      <div class="entry-info">
        <div class="entry-name">Sisa dari kemarin</div>
        <div class="entry-sub">Otomatis terbawa</div>
      </div>
      <div class="entry-right"><div class="entry-amount amt-in">+${fmt(c.sisaKemarin)}</div></div>
    </div>`;
  }

  dayIncome.forEach(e=>{
    html+=`<div class="entry">
      <div class="entry-icon icon-in">💰</div>
      <div class="entry-info">
        <div class="entry-name">Kas masuk</div>
        <div class="entry-sub" style="color:var(--danger)">Tap 🗑 jika salah input</div>
      </div>
      <div class="entry-right"><div class="entry-amount amt-in">+${fmt(e.jumlah)}</div></div>
      <button class="del-btn" onclick="delIncome(${e.id})">🗑</button>
    </div>`;
  });

  html+=`<div class="kas-awal-footer">
    <span style="color:var(--muted)">Kas awal hari ini</span>
    <span style="font-weight:700;color:${tab==='saldo'?'var(--saldo)':'var(--cash)'}">${fmt(c.kasAwal)}</span>
  </div>`;

  if(dayOut.length>0){
    html+=`<div class="sec-label">💸 Pengeluaran</div>`;
    let running=c.kasAwal;
    dayOut.forEach(e=>{
      running-=e.harga;
      const ok=running>=0;
      const sc=ok?acColor:'var(--danger)';
      const icon=ICONS[e.item.length%ICONS.length];
      html+=`<div class="entry">
        <div class="entry-icon icon-out">${icon}</div>
        <div class="entry-info">
          <div class="entry-name">${e.item}</div>
          <div class="entry-sub" style="color:${sc}">Sisa: ${fmt(running)}</div>
        </div>
        <div class="entry-right"><div class="entry-amount amt-out">−${fmt(e.harga)}</div></div>
        <button class="del-btn" onclick="delOut(${e.id})">×</button>
      </div>`;
    });
  } else {
    html+=`<div style="text-align:center;padding:18px 0 6px;font-size:13px;color:var(--muted)">Belum ada pengeluaran.<br>Tap ＋ untuk tambah.</div>`;
  }

  la.innerHTML=html;
}

function setSummary(label,sisa,awalLabel,awal,keluar,trx,acColor){
  document.getElementById('sum-label').textContent=label;
  const se=document.getElementById('sum-sisa');
  se.textContent=fmt(sisa);
  se.className='bal-value '+(sisa<0?'bal-neg':(tab==='saldo'?'bal-s':'bal-c'));
  document.getElementById('sum-awal-label').textContent=awalLabel;
  document.getElementById('sum-awal-val').textContent=fmt(awal);
  document.getElementById('sum-awal-val').style.color=acColor;
  document.getElementById('sum-keluar').textContent=fmt(keluar);
  document.getElementById('sum-trx').textContent=trx+' item';
}

function openSheet(){
  const dates=getAllDates().sort();
  document.getElementById('inp-tgl').value=filter!=='all'?filter:(dates.length?dates[dates.length-1]:todayStr());
  document.getElementById('inp-item').value='';
  document.getElementById('inp-harga').value='';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  setTimeout(()=>document.getElementById('inp-item').focus(),350);
}
function closeSheet(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
function addEntry(){
  const tgl=document.getElementById('inp-tgl').value;
  const item=document.getElementById('inp-item').value.trim();
  const harga=parseFloat(document.getElementById('inp-harga').value)||0;
  if(!tgl||!item||!harga){document.getElementById('inp-item').focus();return;}
  data[tab].push({id:Date.now(),tgl,item,harga});
  saveOut(tab);
  closeSheet();
  filter=tgl;
  render();
}

document.getElementById('kas-tgl').value=todayStr();

setTimeout(()=>{
  const standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(/iPhone|iPad|Android/i.test(navigator.userAgent)&&!standalone&&!localStorage.getItem('keu6_banner')){
    document.getElementById('install-banner').style.display='flex';
    localStorage.setItem('keu6_banner','1');
  }
},3000);

load();render();
</script>
</body>
</html>
